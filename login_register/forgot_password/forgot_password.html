<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Hệ Thống Ghép Trọ Cao Cấp</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="forgot_password.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Khôi phục mật khẩu</h2>
                <p>Nhập thông tin xác thực để tạo lại mật khẩu mới</p>
            </div>
            
            <form class="auth-form" id="resetPwdForm">
                <div class="input-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập username của bạn" required>
                </div>

                <div class="input-group">
                    <label for="email">Địa chỉ Email liên kết</label>
                    <input type="email" id="email" name="email" placeholder="Nhập email" required>
                </div>

                <div class="input-group">
                    <label for="phone">Số điện thoại đăng ký</label>
                    <input type="tel" id="phone" name="phone" placeholder="Nhập SĐT của bạn" required>
                </div>

                <div class="divider">
                    <span>Mật khẩu mới</span>
                </div>

                <div class="input-group">
                    <label for="new_password">Mật khẩu mới</label>
                    <input type="password" name="new_password" id="new_password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="confirm_password">Xác nhận mật khẩu mới</label>
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn">Cập Nhật Mật Khẩu</button>

                <div class="auth-redirect">
                    <a href="../login/login.html">Quay lại trang Đăng Nhập</a>
                </div>
            </form>
        </div>
    </div>
    <script src="forgot_password.js"></script>
</body>
</html>
